[env:esp32-c3-dual-usb]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Оптимизация разделов флэш-памяти под асинхронный сервер
board_build.partitions = min_spiffs.csv

; Прямые ссылки на библиотеки для гарантированного скачивания под ESP32
lib_deps =
    me-no-dev/AsyncTCP @ ^1.1.1
    https://github.com/me-no-dev/ESPAsyncWebServer.git
